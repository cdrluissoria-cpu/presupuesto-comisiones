<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuesto — Comisión Justicia y Paz</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f2;
    --ink: #1a1410;
    --ink-light: #4a3f35;
    --ink-muted: #8a7a6e;
    --accent: #7a3e1e;
    --accent-light: #c4714a;
    --accent-pale: #f5ece4;
    --line: #ddd5c8;
    --line-strong: #c4b8a8;
    --green: #2d6a4f;
    --red: #c0392b;
    --shadow: 0 1px 4px rgba(26,20,16,0.08);
    --shadow-md: 0 4px 16px rgba(26,20,16,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
  }
  .header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.01em;
    line-height: 1.1;
  }
  .header-left p {
    font-size: 12px;
    color: var(--line-strong);
    margin-top: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .year-input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    width: 90px;
    text-align: center;
  }
  .year-input:focus { outline: none; border-color: var(--accent-light); }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--line);
    padding: 12px 40px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #6a3418; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--ink-light);
  }
  .btn-outline:hover { background: var(--accent-pale); border-color: var(--accent-light); color: var(--accent); }
  .btn-print {
    background: var(--ink);
    color: var(--cream);
    margin-left: auto;
  }
  .btn-print:hover { background: #2d2520; }

  /* ── MAIN ── */
  main {
    padding: 32px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── RUBRO CARD ── */
  .rubro-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .rubro-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--accent-pale);
    border-bottom: 1px solid var(--line);
  }
  .rubro-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
  }
  .rubro-name:focus { border-bottom: 1px dashed var(--accent-light); }
  .rubro-total-label {
    font-size: 12px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .rubro-total-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    min-width: 110px;
    text-align: right;
  }
  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 16px;
    padding: 3px 6px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: rgba(122,62,30,0.1); color: var(--accent); }
  .btn-icon.del:hover { background: rgba(192,57,43,0.1); color: var(--red); }

  /* ── TABLE ── */
  .rubro-table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: var(--cream);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  thead th.num { text-align: right; }

  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fdfaf7; }

  td { padding: 6px 12px; vertical-align: middle; }
  td input, td select {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
    padding: 3px 0;
  }
  td input:focus, td select:focus {
    border-bottom: 1.5px solid var(--accent-light);
    background: var(--accent-pale);
    border-radius: 2px;
    padding: 3px 4px;
  }
  td input.right { text-align: right; }
  td.subtotal {
    text-align: right;
    font-weight: 500;
    color: var(--ink-light);
    white-space: nowrap;
    font-size: 13.5px;
  }
  td.td-del { width: 32px; text-align: center; }

  /* ── ADD ROW ── */
  .add-row-bar {
    padding: 8px 18px;
    border-top: 1px dashed var(--line);
    background: #fefdfb;
  }
  .btn-add-row {
    background: none;
    border: none;
    color: var(--accent-light);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    padding: 2px 0;
    transition: color 0.15s;
  }
  .btn-add-row:hover { color: var(--accent); }

  /* ── RESUMEN TOTAL ── */
  .resumen {
    background: var(--ink);
    color: var(--cream);
    border-radius: 10px;
    padding: 24px 28px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .resumen-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
  }
  .resumen-sub {
    font-size: 11px;
    color: var(--line-strong);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-top: 2px;
  }
  .resumen-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent-light);
  }
  .resumen-breakdown {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12.5px;
    color: var(--line-strong);
    min-width: 240px;
  }
  .resumen-row {
    display: flex;
    justify-content: space-between;
    gap: 20px;
  }
  .resumen-row span:last-child { font-weight: 500; color: var(--cream); }

  /* ── MESES ── */
  .meses-list {
    font-size: 11.5px;
    color: var(--ink-muted);
  }

  /* ══ PRINT ══ */
  @media print {
    body { background: #fff; font-size: 12px; }
    header { padding: 16px 24px; }
    .toolbar, .btn-icon, .add-row-bar, .btn-add-row { display: none !important; }
    main { padding: 16px 24px; }
    .rubro-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; margin-bottom: 14px; }
    .resumen { background: #1a1410; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    td input, td select { font-size: 12px; }
    td.td-del { display: none; }
    thead th:last-child { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Comisión Justicia y Paz</h1>
    <p>Congregación Hermanas Dominicas · Presupuesto Anual</p>
  </div>
  <div class="header-right">
    <input class="year-input" id="yearInput" type="number" value="2025">
  </div>
</header>

<div class="toolbar">
  <button class="btn btn-primary" onclick="addRubro()">＋ Agregar rubro</button>
  <button class="btn btn-outline" onclick="expandAll()">↕ Expandir todo</button>
  <button class="btn btn-outline" onclick="collapseAll()">↕ Colapsar todo</button>
  <button class="btn btn-print btn-print" onclick="window.print()">🖨 Imprimir / PDF</button>
</div>

<main id="main">
  <!-- rubros rendered here -->
  <div id="rubros-container"></div>
  <div class="resumen" id="resumen">
    <div>
      <div class="resumen-label">Total Presupuesto</div>
      <div class="resumen-sub">Comisión Justicia y Paz</div>
    </div>
    <div class="resumen-breakdown" id="resumen-breakdown"></div>
    <div class="resumen-amount" id="resumen-total">$ 0</div>
  </div>
</main>

<script>
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ── STATE ──
let rubros = [
  {
    id: uid(), name: 'Movilidad',
    rows: [
      { id: uid(), desc: 'Pasaje Rosario–Tucumán (ida y vuelta) · Analía', qty: 1, price: 416000, mes: 'Mar' },
      { id: uid(), desc: 'Pasaje Rosario–Tucumán (ida y vuelta) · Otras', qty: 5, price: 416000, mes: '' },
    ]
  },
  {
    id: uid(), name: 'Viático',
    rows: [
      { id: uid(), desc: 'Almuerzos (3 almuerzos × 7 personas × 2 encuentros)', qty: 42, price: 0, mes: '' },
      { id: uid(), desc: 'Cenas (3 cenas × 7 personas × 2 encuentros)', qty: 42, price: 0, mes: '' },
    ]
  },
  {
    id: uid(), name: 'Capacitación',
    rows: [
      { id: uid(), desc: 'Capacitación', qty: 1, price: 400000, mes: '' },
    ]
  },
  {
    id: uid(), name: 'Libros',
    rows: [
      { id: uid(), desc: '', qty: 1, price: 0, mes: '' },
    ]
  },
  {
    id: uid(), name: 'Material encuentro',
    rows: [
      { id: uid(), desc: 'Material para encuentros', qty: 1, price: 150000, mes: '' },
    ]
  },
  {
    id: uid(), name: 'Suscripción revistas',
    rows: [
      { id: uid(), desc: 'Suscripción anual', qty: 1, price: 100000, mes: '' },
    ]
  },
];

function uid() { return '_' + Math.random().toString(36).slice(2,9); }

function fmt(n) {
  if (!n || isNaN(n)) return '$ 0';
  return '$ ' + Math.round(n).toLocaleString('es-AR');
}

function rowSubtotal(r) { return (parseFloat(r.qty)||0) * (parseFloat(r.price)||0); }
function rubroTotal(rub) { return rub.rows.reduce((s,r) => s + rowSubtotal(r), 0); }
function grandTotal() { return rubros.reduce((s,r) => s + rubroTotal(r), 0); }

// ── RENDER ──
function render() {
  const c = document.getElementById('rubros-container');
  c.innerHTML = '';
  rubros.forEach(rub => c.appendChild(buildCard(rub)));
  renderResumen();
}

function buildCard(rub) {
  const card = document.createElement('div');
  card.className = 'rubro-card';
  card.id = 'card-' + rub.id;

  const total = rubroTotal(rub);

  card.innerHTML = `
    <div class="rubro-header">
      <input class="rubro-name" value="${esc(rub.name)}" placeholder="Nombre del rubro"
        onchange="updateRubroName('${rub.id}', this.value)">
      <span class="rubro-total-label">Total</span>
      <span class="rubro-total-amount" id="rtotal-${rub.id}">${fmt(total)}</span>
      <button class="btn-icon" onclick="toggleCard('${rub.id}')" title="Colapsar">▲</button>
      <button class="btn-icon del" onclick="deleteRubro('${rub.id}')" title="Eliminar rubro">✕</button>
    </div>
    <div id="body-${rub.id}">
      <div class="rubro-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:40%">Descripción</th>
              <th class="num" style="width:9%">Cantidad</th>
              <th class="num" style="width:14%">Precio unit.</th>
              <th style="width:10%">Mes</th>
              <th class="num" style="width:14%">Subtotal</th>
              <th style="width:5%"></th>
            </tr>
          </thead>
          <tbody id="tbody-${rub.id}">
            ${rub.rows.map(r => buildRow(rub.id, r)).join('')}
          </tbody>
        </table>
      </div>
      <div class="add-row-bar">
        <button class="btn-add-row" onclick="addRow('${rub.id}')">＋ Agregar línea</button>
      </div>
    </div>
  `;
  return card;
}

function buildRow(rubId, r) {
  const sub = rowSubtotal(r);
  const mesOpts = ['', ...MESES].map(m =>
    `<option value="${m}" ${r.mes===m?'selected':''}>${m}</option>`
  ).join('');
  return `<tr id="row-${r.id}">
    <td><input value="${esc(r.desc)}" placeholder="Descripción…" onchange="updateField('${rubId}','${r.id}','desc',this.value)"></td>
    <td><input class="right" type="number" min="0" value="${r.qty}" onchange="updateField('${rubId}','${r.id}','qty',this.value)"></td>
    <td><input class="right" type="number" min="0" value="${r.price}" onchange="updateField('${rubId}','${r.id}','price',this.value)"></td>
    <td><select onchange="updateField('${rubId}','${r.id}','mes',this.value)">${mesOpts}</select></td>
    <td class="subtotal" id="sub-${r.id}">${fmt(sub)}</td>
    <td class="td-del"><button class="btn-icon del" onclick="deleteRow('${rubId}','${r.id}')">✕</button></td>
  </tr>`;
}

function esc(s) { return (s||'').replace(/"/g,'&quot;'); }

// ── UPDATES (in-place, no full re-render) ──
function updateField(rubId, rowId, field, val) {
  const rub = rubros.find(r => r.id === rubId);
  const row = rub.rows.find(r => r.id === rowId);
  if (field === 'qty' || field === 'price') row[field] = parseFloat(val)||0;
  else row[field] = val;

  // update subtotal cell
  const sub = rowSubtotal(row);
  document.getElementById('sub-' + rowId).textContent = fmt(sub);
  // update rubro total
  document.getElementById('rtotal-' + rubId).textContent = fmt(rubroTotal(rub));
  renderResumen();
}

function updateRubroName(rubId, val) {
  rubros.find(r => r.id === rubId).name = val;
  renderResumen();
}

function addRow(rubId) {
  const rub = rubros.find(r => r.id === rubId);
  const row = { id: uid(), desc: '', qty: 1, price: 0, mes: '' };
  rub.rows.push(row);
  const tbody = document.getElementById('tbody-' + rubId);
  const tr = document.createElement('tr');
  tr.outerHTML; // placeholder
  tbody.insertAdjacentHTML('beforeend', buildRow(rubId, row));
  // attach events (they're inline so just need the dom)
  renderResumen();
}

function deleteRow(rubId, rowId) {
  const rub = rubros.find(r => r.id === rubId);
  rub.rows = rub.rows.filter(r => r.id !== rowId);
  document.getElementById('row-' + rowId)?.remove();
  document.getElementById('rtotal-' + rubId).textContent = fmt(rubroTotal(rub));
  renderResumen();
}

function addRubro() {
  const rub = { id: uid(), name: 'Nuevo rubro', rows: [{ id: uid(), desc: '', qty: 1, price: 0, mes: '' }] };
  rubros.push(rub);
  const c = document.getElementById('rubros-container');
  c.appendChild(buildCard(rub));
  renderResumen();
  // focus name
  setTimeout(() => {
    const inp = document.querySelector('#card-' + rub.id + ' .rubro-name');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

function deleteRubro(rubId) {
  if (!confirm('¿Eliminar este rubro?')) return;
  rubros = rubros.filter(r => r.id !== rubId);
  document.getElementById('card-' + rubId)?.remove();
  renderResumen();
}

let collapsed = {};
function toggleCard(rubId) {
  collapsed[rubId] = !collapsed[rubId];
  const body = document.getElementById('body-' + rubId);
  const btn = document.querySelector('#card-' + rubId + ' .btn-icon:not(.del)');
  body.style.display = collapsed[rubId] ? 'none' : '';
  if (btn) btn.textContent = collapsed[rubId] ? '▼' : '▲';
}
function expandAll() { rubros.forEach(r => { collapsed[r.id]=false; const b=document.getElementById('body-'+r.id); const btn=document.querySelector('#card-'+r.id+' .btn-icon:not(.del)'); if(b)b.style.display=''; if(btn)btn.textContent='▲'; }); }
function collapseAll() { rubros.forEach(r => { collapsed[r.id]=true; const b=document.getElementById('body-'+r.id); const btn=document.querySelector('#card-'+r.id+' .btn-icon:not(.del)'); if(b)b.style.display='none'; if(btn)btn.textContent='▼'; }); }

function renderResumen() {
  const gt = grandTotal();
  document.getElementById('resumen-total').textContent = fmt(gt);
  const bd = document.getElementById('resumen-breakdown');
  bd.innerHTML = rubros.map(r => {
    const t = rubroTotal(r);
    if (!t) return '';
    return `<div class="resumen-row"><span>${r.name}</span><span>${fmt(t)}</span></div>`;
  }).join('');
}

// ── INIT ──
render();
</script>
</body>
</html>
